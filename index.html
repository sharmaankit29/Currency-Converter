<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        :root {
            --blue-50: #eaf2ff;
            --blue-100: #d3e4ff;
            --blue-300: #8fb8f7;
            --blue-500: #2f6fed;
            --blue-600: #1e56c9;
            --blue-700: #14439e;
            --blue-900: #0b2a63;
            --white: #ffffff;
            --gray-text: #5b6679;
            --red: #c0392b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(180deg, var(--blue-50) 0%, var(--white) 45%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--white);
            border: 1px solid var(--blue-100);
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(20, 67, 158, 0.10);
            padding: 32px 28px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .icon-badge {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--blue-500);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-badge svg {
            width: 20px;
            height: 20px;
            stroke: var(--white);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--blue-900);
            margin: 0;
        }

        .api-note {
            font-size: 12px;
            color: var(--gray-text);
            margin: 0 0 22px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-text);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        input[type="number"],
        select {
            width: 100%;
            height: 46px;
            border: 1.5px solid var(--blue-100);
            border-radius: 10px;
            padding: 0 14px;
            font-size: 16px;
            color: var(--blue-900);
            background: var(--white);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            appearance: none;
            -webkit-appearance: none;
        }

        select {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%231e56c9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
            cursor: pointer;
        }

        input[type="number"]:focus,
        select:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 44px 1fr;
            gap: 10px;
            align-items: end;
            margin-bottom: 22px;
        }

        .swap-btn {
            height: 46px;
            width: 44px;
            border-radius: 10px;
            border: 1.5px solid var(--blue-100);
            background: var(--blue-50);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, transform 0.15s ease;
        }

        .swap-btn:hover {
            background: var(--blue-100);
        }

        .swap-btn:active {
            transform: scale(0.94);
        }

        .swap-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--blue-600);
        }

        button.convert-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 10px;
            background: var(--blue-600);
            color: var(--white);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            margin-bottom: 18px;
        }

        button.convert-btn:hover {
            background: var(--blue-700);
        }

        button.convert-btn:active {
            transform: scale(0.98);
        }

        button.convert-btn:disabled {
            background: var(--blue-300);
            cursor: not-allowed;
        }

        .result-box {
            background: var(--blue-900);
            border-radius: 14px;
            padding: 20px;
            min-height: 88px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-box.error {
            background: var(--red);
        }

        .result-box p.value {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: var(--white);
            word-break: break-word;
        }

        .result-box p.sub {
            margin: 6px 0 0;
            font-size: 12.5px;
            color: var(--blue-300);
        }

        .result-box.error p.sub {
            color: #f5c6c0;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: -2px;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 420px) {
            .card {
                padding: 26px 20px;
            }

            .result-box p.value {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <div class="icon-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path
                        d="M12 7v10M9 9.5c0-1.4 1.3-2.5 3-2.5s3 1.1 3 2.5c0 3-6 1.5-6 4.5 0 1.4 1.3 2.5 3 2.5s3-1.1 3-2.5">
                    </path>
                </svg>
            </div>
            <h1>Currency converter</h1>
        </div>
        <p class="api-note"> Refreshes every 24 hours</p>

        <div class="field">
            <label for="amount">Amount</label>
            <input type="number" id="amount" value="100" min="0" step="any">
        </div>

        <div class="row">
            <div class="field" style="margin-bottom:0;">
                <label for="from">From</label>
                <select id="from"></select>
            </div>

            <button class="swap-btn" id="swap" aria-label="Swap currencies" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 7h13l-4-4M17 17H4l4 4"></path>
                </svg>
            </button>

            <div class="field" style="margin-bottom:0;">
                <label for="to">To</label>
                <select id="to"></select>
            </div>
        </div>

        <button class="convert-btn" id="convertBtn" type="button">Convert</button>

        <div class="result-box" id="resultBox" style="display:none;">
            <p class="value" id="resultValue"></p>
        </div>
    </div>

    <script>
        const apiKey = "d2929029d4610deaa4c34a07"; // <-- exchangerate-api.com API key
        const API_URL = `https://v6.exchangerate-api.com/v6/${apiKey}/latest/USD`;

        const currencies = [
            "AED", "AFN", "ALL", "AMD", "ANG", "AOA", "ARS", "AUD", "AWG", "AZN",
            "BAM", "BBD", "BDT", "BGN", "BHD", "BIF", "BMD", "BND", "BOB", "BRL",
            "BSD", "BTN", "BWP", "BYN", "BZD", "CAD", "CDF", "CHF", "CLP", "CNY",
            "COP", "CRC", "CUP", "CVE", "CZK", "DJF", "DKK", "DOP", "DZD", "EGP",
            "ERN", "ETB", "EUR", "FJD", "FKP", "FOK", "GBP", "GEL", "GGP", "GHS",
            "GIP", "GMD", "GNF", "GTQ", "GYD", "HKD", "HNL", "HRK", "HTG", "HUF",
            "IDR", "ILS", "IMP", "INR", "IQD", "IRR", "ISK", "JEP", "JMD", "JOD",
            "JPY", "KES", "KGS", "KHR", "KID", "KMF", "KRW", "KWD", "KYD", "KZT",
            "LAK", "LBP", "LKR", "LRD", "LSL", "LYD", "MAD", "MDL", "MGA", "MKD",
            "MMK", "MNT", "MOP", "MRU", "MUR", "MVR", "MWK", "MXN", "MYR", "MZN",
            "NAD", "NGN", "NIO", "NOK", "NPR", "NZD", "OMR", "PAB", "PEN", "PGK",
            "PHP", "PKR", "PLN", "PYG", "QAR", "RON", "RSD", "RUB", "RWF", "SAR",
            "SBD", "SCR", "SDG", "SEK", "SGD", "SHP", "SLE", "SOS", "SRD", "SSP",
            "STN", "SYP", "SZL", "THB", "TJS", "TMT", "TND", "TOP", "TRY", "TTD",
            "TVD", "TWD", "TZS", "UAH", "UGX", "USD", "UYU", "UZS", "VES", "VND",
            "VUV", "WST", "XAF", "XCD", "XDR", "XOF", "XPF", "YER", "ZAR", "ZMW",
            "ZWL"
        ];

        const fromSel = document.getElementById('from');
        const toSel = document.getElementById('to');
        const amountEl = document.getElementById('amount');
        const convertBtn = document.getElementById('convertBtn');
        const resultBox = document.getElementById('resultBox');
        const resultValue = document.getElementById('resultValue');

        currencies.forEach(code => {
            const opt1 = document.createElement('option');
            opt1.value = code;
            opt1.textContent = code;
            fromSel.appendChild(opt1);
            toSel.appendChild(opt1.cloneNode(true));
        });
        fromSel.value = 'USD';
        toSel.value = 'INR';

        // Rates are fetched once with USD as base, then cached with other
        let cachedRates = null;
        let cachedTimestamp = null;

        function fmt(n) {
            return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(n);
        }

        function showLoading() {
            resultBox.style.display = 'flex';
            resultBox.classList.remove('error');
            resultValue.innerHTML = '<span class="spinner"></span>Fetching live rate&hellip;';
            const sub = resultBox.querySelector('.sub');
            if (sub) sub.remove();
        }

        function showError(message) {
            resultBox.style.display = 'flex';
            resultBox.classList.add('error');
            resultValue.textContent = message;
            const sub = resultBox.querySelector('.sub');
            if (sub) sub.remove();
        }

        function showResult(amount, from, to, converted, rate, lastUpdated) {
            resultBox.style.display = 'flex';
            resultBox.classList.remove('error');
            resultValue.textContent = fmt(amount) + ' ' + from + ' = ' + fmt(converted) + ' ' + to;

            let sub = resultBox.querySelector('.sub');
            if (!sub) {
                sub = document.createElement('p');
                sub.className = 'sub';
                resultBox.appendChild(sub);
            }
            sub.textContent = '1 ' + from + ' = ' + fmt(rate) + ' ' + to;
        }

        // Fetches the USD-based rate table once and reuses it on every later call.
        async function getRates() {
            if (cachedRates) return cachedRates;

            const response = await fetch(API_URL);
            let data;
            try {
                data = await response.json();
            } catch (parseErr) {
                throw new Error('bad-response');
            }

            if (data.result !== 'success') {
                throw new Error('api:' + (data['error-type'] || 'unknown error'));
            }

            cachedRates = data.conversion_rates;
            cachedTimestamp = data.time_last_update_utc || 'unknown';
            return cachedRates;
        }

        async function convertCurrency() {
            const amt = parseFloat(amountEl.value);
            const from = fromSel.value;
            const to = toSel.value;

            if (amountEl.value.trim() === '' || isNaN(amt) || amt < 0) {
                showError('Please enter a valid amount');
                return;
            }

            convertBtn.disabled = true;
            showLoading();

            try {
                const rates = await getRates();
                const fromRate = rates[from];
                const toRate = rates[to];
                const converted = (amt / fromRate) * toRate;
                const pairRate = toRate / fromRate;

                showResult(amt, from, to, converted, pairRate);
            } catch (err) {
                if (err.message && err.message.startsWith('api:')) {
                    showError('API error: ' + err.message.slice(4));
                }
            } finally {
                convertBtn.disabled = false;
            }
        }

        convertBtn.addEventListener('click', convertCurrency);

        document.getElementById('swap').addEventListener('click', () => {
            const f = fromSel.value;
            fromSel.value = toSel.value;
            toSel.value = f;
        });

        amountEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') convertCurrency();
        });
    </script>

</body>

</html>
